<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>interaktives video</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
      
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Festes 16:9 — Hotspots bleiben immer an der richtigen Stelle */
    #video-container {
      position: relative;
      width: min(100vw, calc(100vh * (16 / 9)));
      height: min(100vh, calc(100vw * (9 / 16)));
      flex-shrink: 0;
      container-type: inline-size; /* erlaubt cqw-Einheiten: skalieren mit Container-Breite */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* =============================================
       START-SCREEN
       ============================================= */

    #start-screen {
      position: absolute;
      top: 50%;
      left: 18.5%;
      width: 58.6%;
      height: 8.85%;
      display: flex;
    }

    /* === START-BUTTON — hier anpassen === */
    #start-btn {
      cursor: pointer;
      width: 100%;
      height: 100%;
      padding: 0 5vw;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0);
      border: 5px solid rgba(3, 252, 92, 0);
      color: rgba(255, 255, 255, 0);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2vw;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
    }

    /* Phase 1: blinkender Cursor im leeren Button */
    #start-btn-cursor {
      display: inline-block;
      width: 0.156cqw;          /* schmaler — war 0.65em, dann 2px */
      height: 1.3em;       /* höher — war 1em */
      background: rgba(255, 255, 255, 0.85);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* Phase 2: getippter Text im Button */
    #start-btn-text {
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Source Sans 3';
      font-weight: 200;
      font-size: 1.875cqw;
      letter-spacing: 1px;
      text-transform: none;
      white-space: nowrap;
    }

    /* Startbutton 2 — grüner Kreis */
    #start-btn-2 {
      position: absolute;
      top: 50%;
      left: 93.1%;
      width: 3.515cqw;
      height: 3.4375cqw;
      border-radius: 50%;
      background: rgba(3, 252, 92, 0.3);
      border: none;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      right: -6.25cqw;
      top: 50%;
      transform: translateY(-50%) scale(0.8);
      z-index: 10;
      --pulse-color: rgba(3, 252, 92, 0.3);
      --pulse-size: 0.390625cqw;
    }

    #start-btn-2.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(-50%) scale(1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #start-btn-2:hover {
      background: rgba(3, 252, 92, 0.5);
    }


    #start-screen.hidden {
      display: none;
    }


    /* =============================================
       HOTSPOT-LAYER
       ============================================= */

    #hotspot-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Overlay und text-area füllen den ganzen Video-Container */
    #overlay,
    #text-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .hotspot {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.04);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5625cqw;
      font-weight: 700;
      color: #000000;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.625cqw;
      opacity: 0;
      transition: opacity 0.6s, background 0.2s;
      --pulse-size: 0.78125cqw;
    }

    .hotspot.visible {
      opacity: 1;
      pointer-events: all;
    }

    .hotspot:hover {
      background: rgba(3, 252, 92, 0.2);
    }


    /* =============================================
       ÜBERGANGS-OVERLAY
       ============================================= */

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #overlay.fade {
      opacity: 1;
    }


    /* =============================================
       PULSE-ANIMATION
       ============================================= */

      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0px var(--pulse-color); }
        100% { box-shadow: 0 0 0 var(--pulse-size) transparent; }
      }

    .hotspot.pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }


    /* =============================================
       TEXT-BEREICH
       ============================================= */

    #text-area {
      position: absolute;
      top: 0;
      left: 0;

      /* === GRÖSSE — hier anpassen === */
      width: 25%;
      height: 100%;

      /* === AUSSEHEN — hier anpassen === */
      background: #000;
      padding: 0;

      display: flex;
      flex-direction: column;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    /* Haupttext-Bereich: obere ¾ */
    #text-main {
      flex: 3;
      padding: 1.5625cqw 1.5625cqw 1.25cqw 1.5625cqw;
      overflow: hidden;
    }

    /* Fußnoten-Bereich: untere ¼ */
    #text-footnote {
      height: 12.89cqw;
      lex: none;
      padding: 0.9375cqw 1.25cqw 1.25cqw 1.25cqw;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      overflow-y: auto;
    }

    #footnote-content {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78125cqw;           /* === FUSSNOTEN-SCHRIFTGRÖSSE — hier anpassen === */
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.3px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    #text-area.visible {
      opacity: 1;
    }

    #text-content {
      /* === SCHRIFT — hier anpassen === */
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.40625cqw;
      line-height: 1.3;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.85);
    }

    #text-cursor {
      display: inline-block;
      width: 0.625cqw;
      height: 1em;
      background: rgba(255, 255, 255, 0.7);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    #text-cursor.hidden {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* =============================================
       VIDEO-LABELS (Beschriftungen im Video)
       ============================================= */

    .video-label {
      position: absolute;
      pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.09375cqw;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 1px 3px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.50);
      padding: 0.3125cqw 0.78125cqw
    }

    .video-label.visible {
      opacity: 1;
    }

    .video-label-cursor {
      display: inline-block;
      width: 0.546875cqw;
      height: 1em;
      background: rgba(255, 255, 255, 0.7);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* =============================================
       UMRANDUNGEN (erscheinen erst ab 2. Video)
       ============================================= */

    /* =============================================
       QUELLEN-SPOT & TOOLTIP
       ============================================= */

    #source-spot {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 3.125cqw;
      height: 3.125cqw;
      border-radius: 50%;
      background: rgba(252, 252, 252, 0.2);
      cursor: pointer;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.859375cqw;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      
      z-index: 20;
      transform: translate(-50%, -50%);
    }

    #source-spot.visible {
      opacity: 1;
      pointer-events: all;
    }

    #source-tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(0, 0, 0, 0.92);
      border: 1.5px solid rgba(3, 252, 92, 0);
      padding: 1.09375cqw 1.40625cqw;
      max-width: 25cqw;
      min-width: 14.0625cqw;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.859375cqw;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.85);
      z-index: 30;
      white-space: pre-wrap;
      transform: translateX(-50%);
    }

    #source-tooltip.visible {
      opacity: 1;
    }

    #source-tooltip strong {
      color: rgba(3, 252, 92, 0.95);
      display: block;
      margin-bottom: 6px;
      font-size: 0.9375cqw;
      letter-spacing: 1px;
    }

    /* =============================================
       INFO-SPOT (rechts oben) & INFO-TOOLTIP
       Hier lassen sich Position, Icon/Text, Schrift,
       Farben usw. frei anpassen.
       ============================================= */

    #info-spot {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1.953125cqw;
      height: 1.953125cqw;
      border-radius: 50%;
      border: 0.15625cqw solid rgba(3, 252, 92, 1);
      background: rgba(3, 252, 92, 0);
      cursor: pointer;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.859375cqw;
      font-weight: 300;
      color: rgba(3, 252, 92, 0);
      letter-spacing: 0.5px;
      text-transform: uppercase;

      z-index: 20;
      transform: translate(-50%, -50%);
    }

    #info-spot.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* === INFO-BUTTON AUF DEM STARTSCREEN — Position hier anpassen ===
       Gilt nur, solange der Startscreen sichtbar ist. */
    #info-spot.on-start-screen {
      left: 94.8%;
      top: 10.6%;
    }

    /* INFO-TOOLTIP — das aufklappbare Feld.
       Schrift / Farbe / Größe hier anpassen.
       ACHTUNG: left/top werden per JS automatisch berechnet (relativ zum
       Info-Button) und daher hier ignoriert. Feinjustierung der Position:
       TOOLTIP_OFFSET_X / TOOLTIP_OFFSET_Y im JS-Bereich weiter unten suchen. */
    #info-tooltip {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      background: rgba(255, 255, 255, 0.15);
      border: 0px solid rgba(3, 252, 92, 1);
      border-radius: 5px;
      padding: 0.46875cqw 1.71875cqw;
      max-width: 21.875cqw;
      min-width: 15.625cqw;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1.015625cqw;
      font-weight: 300;
      line-height: 1.4;
      color: rgba(255, 255, 255, 1);
      z-index: 50;
      white-space: pre-wrap;
    }

    #info-tooltip.visible {
      opacity: 1;
      pointer-events: all;
    }

    #info-tooltip-content strong {
      color: rgba(3, 252, 92, 0.95);
      display: block;
      margin-bottom: 8px;
      font-size: 1.09375cqw;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* FORTSCHRITTS-BALKEN */
    #progress-bar-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0.625cqw;
      background: rgba(255, 255, 255, 0.1);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.8s;
    }
    #progress-bar-container.visible {
      opacity: 1;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: rgba(3, 252, 92, 1);
      transition: width 0.6s ease;
      box-shadow: 0 0 8px rgba(3, 252, 92, 0.6);
    }

    #video-container {
      border: 0.234375cqw solid transparent;
      border-radius: 4px;
      transition: border-color 0.8s;
    }

    #video-container.bordered {
      border-color: rgba(3, 252, 92, 1);
    }

    #text-area {
      border-right: 0.234375cqw solid transparent;
      transition: border-color 0.8s;
    }

    #text-area.bordered {
      border-right-color: rgba(3, 252, 92, 1);
    }

  </style>
</head>

  <div id="wrapper">
    <div id="video-container">

      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>

      <video id="video" src="videos/start.mp4" muted preload="metadata"></video>

      <!-- === HINTERGRUNDMUSIK — hier anpassen ===
           src: Pfad zur Audiodatei (z. B. "music/music.wav")
           loop: Musik wiederholt sich automatisch endlos
           Lautstärke wird unten im JS über bgMusic.volume gesetzt (0 bis 1) -->
      <audio id="bg-music" src="music/music.wav" loop preload="auto"></audio>

      <div id="start-screen">
        <button id="start-btn">
          <span id="start-btn-text"></span><span id="start-btn-cursor"></span>
        </button>
        <button id="start-btn-2" title="Starten"></button>
      </div>

      <div id="hotspot-layer"></div>
      <div id="video-label-layer"></div>
      <div id="overlay"></div>

      <!-- Info-Spot (rechts oben) -->
      <div id="info-spot">i</div>

      <!-- Info-Tooltip -->
      <div id="info-tooltip">
        <div id="info-tooltip-content"></div>
      </div>

      <!-- Quellen-Spot -->
      <div id="source-spot">src</div>
      <div id="source-tooltip"></div>

      <div id="text-area">
        <div id="text-main">
          <div id="text-content"><span id="text-cursor"></span></div>
        </div>
        <div id="text-footnote">
          <div id="footnote-content"></div>
        </div>
      </div>

    </div>
  </div>

      visitedScenes.add(sceneId);

      if (!scene) return;

        const hs = scene.hotspots[i];
        if (!hs) return;
        const afterShow  = (hs.showAt === undefined || t >= hs.showAt);
        const beforeHide = (hs.hideAt === undefined || t < hs.hideAt);
        if (afterShow && beforeHide) {
          div.classList.add("visible");
        } else if (hs.hideAt !== undefined && t >= hs.hideAt) {
          div.classList.remove("visible");
        }
      });
    });

      video.addEventListener("ended", () => {
        videoEnded = true;

        // nochmal alle Hotspots prüfen — falls timeupdate sie verpasst hat
        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;

          const afterShow  = (hs.showAt === undefined || video.duration >= hs.showAt);
          const beforeHide = (hs.hideAt === undefined);

          if (afterShow && beforeHide) {
            div.classList.add("visible");
          }
        });

        if (scene.resetToStart) {

            clearTypewriter();
            clearVideoLabels();

        }
      });

      function jumpToEnd() {
        video.currentTime = video.duration - 0.01;
        videoEnded = true;

        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;
          // hideAt respektieren, sonst immer einblenden
          if (hs.hideAt === undefined) {
            div.classList.add("visible");
          }
        });

    // --- Typewriter ---

    // Text-Syntax für Farben: <c:green>Wort</c> oder <c:#ff0000>Wort</c>
    // Vordefinierte Farbnamen: green, red, yellow, orange, cyan, white
    const COLOR_ALIASES = {
      green:  "rgba(3, 252, 92, 0.95)",
      red:    "rgba(255, 80, 80, 0.95)",
      yellow: "rgba(255, 220, 60, 0.95)",
      orange: "rgba(255, 150, 50, 0.95)",
      cyan:   "rgba(80, 220, 255, 0.95)",
      white:  "rgba(255, 255, 255, 1)"
    };

    // Parst Text mit <c:farbe>...</c> in Segmente: [{text, color}]
    function parseColoredText(raw) {
      const segments = [];
      const regex = /<c:([^>]+)>([\s\S]*?)<\/c>/g;
      let last = 0, m;
      while ((m = regex.exec(raw)) !== null) {
        if (m.index > last) segments.push({ text: raw.slice(last, m.index), color: null });
        const col = COLOR_ALIASES[m[1]] || m[1];
        segments.push({ text: m[2], color: col });
        last = m.index + m[0].length;
      }
      if (last < raw.length) segments.push({ text: raw.slice(last), color: null });
      return segments;
    }

    function clearTypewriter() {
      if (typewriterTimeout) {
        clearTimeout(typewriterTimeout);
        typewriterTimeout = null;
      }
      textContent.innerHTML = "";
      textContent.appendChild(textCursor);
      textCursor.classList.remove("hidden");
      textArea.classList.remove("visible");
      document.getElementById("footnote-content").innerHTML = "";
    }

    function startTypewriter(text, areaDelay, delay, speed) {
      clearTypewriter();
      const segments = parseColoredText(text);

      // Alle Zeichen als flache Liste: {char, color} — <br/> wird dabei
      // als eigener Eintrag {isBreak: true} erkannt statt einzeln zerlegt
      const chars = [];
      for (const seg of segments) {
        const brSplit = seg.text.split(/(<br\s*\/?>)/i);
        for (const part of brSplit) {
          if (/^<br\s*\/?>$/i.test(part)) {
            chars.push({ isBreak: true });
          } else {
            for (const ch of part) {
              chars.push({ ch, color: seg.color });
            }
          }
        }
      }

      setTimeout(() => {
        textArea.classList.add("visible");
      }, areaDelay * 1000);

      setTimeout(() => {
        let i = 0;
        function typeNext() {
          if (i < chars.length) {
            const entry = chars[i];
            if (entry.isBreak) {
              const br = document.createElement("br");
              textContent.insertBefore(br, textCursor);
            } else {
              const { ch, color } = entry;
              if (color) {
                const span = document.createElement("span");
                span.style.color = color;
                span.textContent = ch;
                textContent.insertBefore(span, textCursor);
              } else {
                const node = document.createTextNode(ch);
                textContent.insertBefore(node, textCursor);
              }
            }
            i++;
            typewriterTimeout = setTimeout(typeNext, speed);
          } else {
            typewriterTimeout = null;
          }
        }
        typeNext();
      }, delay * 1000);
    }

    // --- Video-Labels ---
    // labels: [ { text, x, y, showAt, hideAt, size, color, speed } ]

    let labelTypewriterTimeouts = [];

    function clearVideoLabels() {
      labelTypewriterTimeouts.forEach(t => clearTimeout(t));
      labelTypewriterTimeouts = [];
      const layer = document.getElementById("video-label-layer");
      if (layer) layer.innerHTML = "";
    }

    function buildVideoLabels(labels) {
      clearVideoLabels();
      if (!labels || !labels.length) return;

      const layer = document.getElementById("video-label-layer");
      layer.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;";

      for (const lb of labels) {
        const div = document.createElement("div");
        div.className = "video-label";
        div.style.left = lb.x || "50%";
        div.style.top  = lb.y || "50%";
        if (lb.size)  div.style.fontSize = pxToCqw(lb.size);
        if (lb.color) div.style.color    = lb.color;

        // Cursor-Span
        const cursor = document.createElement("span");
        cursor.className = "video-label-cursor";
        div.appendChild(cursor);
        layer.appendChild(div);

        // showAt / hideAt via timeupdate
        div._labelCfg = lb;
        div._labelTyped = false;
      }
    }

    // timeupdate für Labels
    video.addEventListener("timeupdate", () => {
      const t = video.currentTime;
      document.querySelectorAll(".video-label").forEach(div => {
        const lb = div._labelCfg;
        if (!lb) return;
        const show = lb.showAt !== undefined ? t >= lb.showAt : true;
        const hide = lb.hideAt !== undefined ? t >= lb.hideAt : false;

        if (hide) {
          div.classList.remove("visible");
          return;
        }
        if (show && !div._labelTyped) {
          div._labelTyped = true;
          div.classList.add("visible");
          const speed = lb.speed !== undefined ? lb.speed : 50;
          const text  = lb.text || "";
          const cursor = div.querySelector(".video-label-cursor");
          let i = 0;
          function typeNext() {
            if (i < text.length) {
              // <br/> (oder <br>, <br />) im Text als echten Zeilenumbruch einfügen,
              // statt es Zeichen für Zeichen als Text darzustellen
              const rest = text.slice(i);
              const brMatch = rest.match(/^<br\s*\/?>/i);
              if (brMatch) {
                const node = document.createElement("br");
                div.insertBefore(node, cursor);
                i += brMatch[0].length;
              } else {
                const node = document.createTextNode(text[i]);
                div.insertBefore(node, cursor);
                i++;
              }
              const tid = setTimeout(typeNext, speed);
              labelTypewriterTimeouts.push(tid);
            } else {
              setTimeout(() => { cursor.style.display = "none"; }, 800);
            }
          }
          typeNext();
        }
      });
    });

    function loadScene(id) {
      if (!id) return;
      currentSceneId = id;
      videoEnded = false;
      const scene = scenes[id];
      resetIdleTimer();
      updateProgressBar(id);

      // Umrandung ab dem ersten Klick (zweites Video)
      document.getElementById("video-container").classList.add("bordered");
      textArea.classList.add("bordered");

      overlay.classList.add("fade");

      setTimeout(() => {
        buildHotspots(scene.hotspots);
        clearVideoLabels();
        if (scene.labels) buildVideoLabels(scene.labels);
        updateSourceSpot(scene);
        updateInfoSpot(scene);

        if (scene.noTextArea) {
          clearTypewriter();
          textArea.classList.remove("visible", "bordered");
        } else if (scene.text) {
          startTypewriter(
            scene.text,
            scene.textAreaDelay !== undefined ? scene.textAreaDelay : 0,
            scene.textDelay     !== undefined ? scene.textDelay     : 0.5,
            scene.textSpeed     !== undefined ? scene.textSpeed     : 40
          );
        } else {
          clearTypewriter();
        }
        if (scene.footnote) {
          document.getElementById("footnote-content").innerHTML =
            scene.footnote.replace(/\n/g, "<br>");
        } else {
          document.getElementById("footnote-content").innerHTML = "";
        }

        if (scene.isMenu && alreadyVisitedMenu) {
          jumpPending = true;
          video.src = scene.file;
          video.load();
        } else {
          video.src = scene.file;
          video.play();
        }

        overlay.classList.remove("fade");
      }, 400);
    }

    // Rechnet "50px" → "3.90625cqw" um, damit Hotspot-Größen aus den
    // Szenen-Daten (in px geschrieben, wie gewohnt) automatisch mit der
    // tatsächlichen Container-Breite mitskalieren. Referenzbreite: 1280px
    // (bei dieser Breite sehen die px-Werte exakt so aus wie angegeben).
    const PX_TO_CQW_REF = 1280;
    function pxToCqw(value) {
      if (typeof value !== "string") return value;
      const m = value.match(/^(-?[0-9.]+)px$/);
      if (!m) return value; // z.B. schon %, cqw, etc. — unverändert lassen
      return (parseFloat(m[1]) / PX_TO_CQW_REF * 100) + "cqw";
    }
    // Wie pxToCqw, ersetzt aber alle px-Werte innerhalb eines längeren
    // Strings (z.B. "3px solid rgba(...)" für hs.border).
    function pxToCqwAny(value) {
      if (typeof value !== "string") return value;
      return value.replace(/(-?[0-9.]+)px/g, (_, num) =>
        (parseFloat(num) / PX_TO_CQW_REF * 100) + "cqw"
      );
    }

    function buildHotspots(hotspots) {
      const layer = document.getElementById("hotspot-layer");
      // SVG-Masken aufräumen
      layer.parentElement.querySelectorAll("svg[data-mask]").forEach(s => s.remove());
      layer.innerHTML = "";

      for (const hs of hotspots) {
        const div = document.createElement("div");
        div.className = "hotspot";
        div.style.left      = hs.x;
        div.style.top       = hs.y;
        div.style.width     = pxToCqw(hs.w);
        div.style.height    = pxToCqw(hs.h);
        div.style.transform = "translate(-50%, -50%)";

        if (hs.label === "weiter") {
          div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>`;
        } else if (hs.label === "X") {
          div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>`;
        } else if (hs.label === "info") {
          div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="currentColor"><path d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>`;
          div.classList.add("hotspot-info");
        } else if (hs.label === "logout") {
          div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/></svg>`;
        } else {
          div.textContent = hs.label || "";
        }
        
        if (hs.color)        div.style.background   = hs.color;
        if (hs.border)       div.style.border       = pxToCqwAny(hs.border);
        if (hs.borderColor)  div.style.borderColor  = hs.borderColor;
        if (hs.borderRadius) div.style.borderRadius = pxToCqwAny(hs.borderRadius);
        if (hs.pulseColor)   div.style.setProperty("--pulse-color", hs.pulseColor);
        if (hs.pulseSize)    div.style.setProperty("--pulse-size",  pxToCqw(hs.pulseSize));
        if (hs.pulse)        div.classList.add("pulse");

        div.onclick = () => {
          if (hs.target === "__reset__") { resetToStart(); } else { loadScene(hs.target); }
        };
        layer.appendChild(div);
      }
    }


    // =============================================
    // QUELLEN-SPOT
    // =============================================

    const sourceSpot    = document.getElementById("source-spot");
    const sourceTooltip = document.getElementById("source-tooltip");
    let sourceShown = false;

    function updateSourceSpot(scene) {
      if (!appStarted) return;  // vor Startbutton-Klick nichts tun
      sourceShown = false;
      sourceSpot.classList.remove("visible");
      sourceTooltip.classList.remove("visible");

      if (!scene || !scene.sources) return;

      const cfg = scene.sources;
      // % relativ zum video-container, genau wie Hotspots
      sourceSpot.style.left = cfg.x || "50%";
      sourceSpot.style.top  = cfg.y || "50%";
      sourceTooltip.innerHTML = "<strong>Quellen</strong>" +
        (cfg.text || "").replace(/\n/g, "<br>");

      if (!cfg.showAt || cfg.showAt <= 0) {
        sourceSpot.classList.add("visible");
        sourceShown = true;
      }
    }

    // timeupdate für showAt des Quellen-Spots
    video.addEventListener("timeupdate", () => {
      if (!appStarted || sourceShown) return;
      const scene = scenes[currentSceneId];
      if (!scene || !scene.sources) return;
      const cfg = scene.sources;
      if (cfg.showAt !== undefined && video.currentTime >= cfg.showAt) {
        sourceSpot.classList.add("visible");
        sourceShown = true;
      }
    });

    // Hover: Tooltip ein-/ausblenden
    sourceSpot.addEventListener("mouseenter", () => {
      const scene = scenes[currentSceneId];
      if (!scene || !scene.sources) return;

      // Spot-Position auslesen (offsetLeft/Top = px relativ zum Container)
      const sl = sourceSpot.offsetLeft;  // Mitte dank transform: translate(-50%,-50%)
      const st = sourceSpot.offsetTop;
      // Tooltip zentriert über dem Spot — Breite messen
      sourceTooltip.style.visibility = "hidden";
      sourceTooltip.style.left = "0px";
      sourceTooltip.style.top  = "0px";
      sourceTooltip.classList.add("visible");
      const ttW = sourceTooltip.offsetWidth;
      const ttH = sourceTooltip.offsetHeight;
      sourceTooltip.classList.remove("visible");
      sourceTooltip.style.visibility = "";
      // Offsets proportional zur Container-Breite (Referenz 1280px),
      // damit der Tooltip auf jedem Bildschirm gleich weit vom Spot sitzt
      const containerW = document.getElementById("video-container").offsetWidth;
      const scale = containerW / PX_TO_CQW_REF;
      sourceTooltip.style.left = (sl - ttW / 2 + 160 * scale) + "px";
      sourceTooltip.style.top  = (st - ttH - 30 * scale) + "px";
      sourceTooltip.classList.add("visible");
    });

    sourceSpot.addEventListener("mouseleave", () => {
      sourceTooltip.classList.remove("visible");
    });

    // =============================================
    // INFO-SPOT (rechts oben, Klick öffnet/schließt Feld)
    // Pro Szene konfigurierbar über scene.info = { x, y, showAt, text }
    // x/y: Position in % relativ zum Video-Container (z.B. "93%", "8%")
    // showAt: ab welcher Sekunde sichtbar (default: 0)
    // text: Inhalt des Felds (Zeilenumbrüche mit \n) — hier eigenen Text einsetzen
    // =============================================

    let infoShown    = false;

    function updateInfoSpot(scene) {
      closeInfoTooltip();
      if (!appStarted) return;
      infoShown = false;
      infoSpot.classList.remove("visible");
      infoSpot.style.left = "-9999px";
      infoSpot.style.top  = "-9999px";

      if (!scene || !scene.info) return;

      const cfg = scene.info;
      infoSpot.style.left = cfg.x || "93%";
      infoSpot.style.top  = cfg.y || "8%";
      infoTooltipContent.innerHTML = (cfg.text || "").replace(/\n/g, "<br>");

      if (!cfg.showAt || cfg.showAt <= 0) {
        infoSpot.classList.add("visible");
        infoShown = true;
      }
    }

    // timeupdate für showAt des Info-Spots
    video.addEventListener("timeupdate", () => {
      if (!appStarted || infoShown) return;
      const scene = scenes[currentSceneId];
      if (!scene || !scene.info) return;
      const cfg = scene.info;
      if (cfg.showAt !== undefined && video.currentTime >= cfg.showAt) {
        infoSpot.classList.add("visible");
        infoShown = true;
      }
    });

    // Klick: Feld öffnen/schließen (Toggle)
    infoSpot.addEventListener("click", (e) => {
      e.stopPropagation();
      if (infoTooltipOpen) { closeInfoTooltip(); return; }

      // Spot-Position auslesen (offsetLeft/Top = Mitte dank transform: translate(-50%,-50%))
      const sl = infoSpot.offsetLeft;
      const st = infoSpot.offsetTop;

      infoTooltip.style.visibility = "hidden";
      infoTooltip.style.left = "0px";
      infoTooltip.style.top  = "0px";
      infoTooltip.classList.add("visible");
      const ttW = infoTooltip.offsetWidth;
      infoTooltip.classList.remove("visible");
      infoTooltip.style.visibility = "";

      // Feld unterhalb des Spots, rechtsbündig zum Spot ausgerichtet
      // === FEINJUSTIERUNG hier anpassen (in Pixel, bezogen auf 1280px Containerbreite) ===
      const TOOLTIP_OFFSET_X = 20;  // + = weiter rechts, - = weiter links
      const TOOLTIP_OFFSET_Y = 30;  // + = weiter unten, - = weiter oben
      const containerW = document.getElementById("video-container").offsetWidth;
      const scale = containerW / PX_TO_CQW_REF;
      infoTooltip.style.left = (sl - ttW + TOOLTIP_OFFSET_X * scale) + "px";
      infoTooltip.style.top  = (st + TOOLTIP_OFFSET_Y * scale) + "px";
      infoTooltip.classList.add("visible");
      infoTooltipOpen = true;
    });

    buildHotspots(scenes[currentSceneId].hotspots);

  </script>
</body>
