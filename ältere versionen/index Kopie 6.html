<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>interaktives video</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
      
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Festes 16:9 — Hotspots bleiben immer an der richtigen Stelle */
    #video-container {
      position: relative;
      width: min(100vw, calc(100vh * (16 / 9)));
      height: min(100vh, calc(100vw * (9 / 16)));
      flex-shrink: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* =============================================
       START-SCREEN
       ============================================= */

    #start-screen {
      position: absolute;
      top: 50%;
      left: 18.5%;
      width: 58.6%;
      height: 8.85%;
      display: flex;
    }

    /* === START-BUTTON — hier anpassen === */
    #start-btn {
      cursor: pointer;
      width: 100%;
      height: 100%;
      padding: 0 5vw;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0);
      border: 5px solid rgba(3, 252, 92, 0);
      color: rgba(255, 255, 255, 0);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2vw;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
    }

    /* Phase 1: blinkender Cursor im leeren Button */
    #start-btn-cursor {
      display: inline-block;
      width: 2px;          /* schmaler — war 0.65em */
      height: 1.3em;       /* höher — war 1em */
      background: rgba(255, 255, 255, 0.85);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* Phase 2: getippter Text im Button */
    #start-btn-text {
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Source Sans 3';
      font-weight: 200;
      font-size: 24px;
      letter-spacing: 1px;
      text-transform: none;
      white-space: nowrap;
    }

    /* Startbutton 2 — grüner Kreis */
    #start-btn-2 {
      position: absolute;
      top: 50%;
      left: 93.1%;
      width: 45px;
      height: 44px;
      border-radius: 50%;
      background: rgba(3, 252, 92, 0.3);
      border: none;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      right: -80px;
      top: 50%;
      transform: translateY(-50%) scale(0.8);
      z-index: 10;
      --pulse-color: rgba(3, 252, 92, 0.3);
      --pulse-size: 5px;
    }

    #start-btn-2.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(-50%) scale(1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #start-btn-2:hover {
      background: rgba(3, 252, 92, 0.5);
    }

    /* Pfeil-Icon im grünen Button
    #start-btn-2::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 16px solid rgba(0, 0, 0, 0.75);
      margin-left: 4px;
    }*/

    #start-screen.hidden {
      display: none;
    }


    /* =============================================
       HOTSPOT-LAYER
       ============================================= */

    #hotspot-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Overlay und text-area füllen den ganzen Video-Container */
    #overlay,
    #text-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .hotspot {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.04);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.7);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      opacity: 0;
      transition: opacity 0.6s, background 0.2s;
      --pulse-size: 10px;
    }

    .hotspot.visible {
      opacity: 1;
      pointer-events: all;
    }

    .hotspot:hover {
      background: rgba(3, 252, 92, 0.2);
    }


    /* =============================================
       ÜBERGANGS-OVERLAY
       ============================================= */

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #overlay.fade {
      opacity: 1;
    }


    /* =============================================
       PULSE-ANIMATION
       ============================================= */

      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0px var(--pulse-color); }
        100% { box-shadow: 0 0 0 var(--pulse-size) transparent; }
      }

    .hotspot.pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }


    /* =============================================
       TEXT-BEREICH
       ============================================= */

    #text-area {
      position: absolute;
      top: 0;
      left: 0;

      /* === GRÖSSE — hier anpassen === */
      width: 25%;
      height: 100%;

      /* === AUSSEHEN — hier anpassen === */
      background: #000;
      padding: 0;

      display: flex;
      flex-direction: column;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    /* Haupttext-Bereich: obere ¾ */
    #text-main {
      flex: 3;
      padding: 20px 20px 16px 20px;
      overflow: hidden;
    }

    /* Fußnoten-Bereich: untere ¼ */
    #text-footnote {
      flex: 1;
      padding: 12px 16px 16px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      overflow-y: auto;
    }

    #footnote-content {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;           /* === FUSSNOTEN-SCHRIFTGRÖSSE — hier anpassen === */
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.3px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    #text-area.visible {
      opacity: 1;
    }

    #text-content {
      /* === SCHRIFT — hier anpassen === */
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.85);
    }

    #text-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: rgba(255, 255, 255, 0.7);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    #text-cursor.hidden {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* =============================================
       VIDEO-LABELS (Beschriftungen im Video)
       ============================================= */

    .video-label {
      position: absolute;
      pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 1px 3px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.50);
      padding: 4px 10px
    }

    .video-label.visible {
      opacity: 1;
    }

    .video-label-cursor {
      display: inline-block;
      width: 7px;
      height: 1em;
      background: rgba(255, 255, 255, 0.7);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* =============================================
       UMRANDUNGEN (erscheinen erst ab 2. Video)
       ============================================= */

    /* =============================================
       QUELLEN-SPOT & TOOLTIP
       ============================================= */

    #source-spot {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(3, 252, 92, 0.2);
      cursor: pointer;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      
      z-index: 20;
      transform: translate(-50%, -50%);
    }

    #source-spot.visible {
      opacity: 1;
      pointer-events: all;
    }

    #source-tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(0, 0, 0, 0.92);
      border: 1.5px solid rgba(3, 252, 92, 0);
      padding: 14px 18px;
      max-width: 320px;
      min-width: 180px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.85);
      z-index: 30;
      white-space: pre-wrap;
      transform: translateX(-50%);
    }

    #source-tooltip.visible {
      opacity: 1;
    }

    #source-tooltip strong {
      color: rgba(3, 252, 92, 0.95);
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* FORTSCHRITTS-BALKEN */
    #progress-bar-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.8s;
    }
    #progress-bar-container.visible {
      opacity: 1;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: rgba(3, 252, 92, 1);
      transition: width 0.6s ease;
      box-shadow: 0 0 8px rgba(3, 252, 92, 0.6);
    }

    #video-container {
      border: 3px solid transparent;
      border-radius: 4px;
      transition: border-color 0.8s;
    }

    #video-container.bordered {
      border-color: rgba(3, 252, 92, 1);
    }

    #text-area {
      border-right: 3px solid transparent;
      transition: border-color 0.8s;
    }

    #text-area.bordered {
      border-right-color: rgba(3, 252, 92, 1);
    }

  </style>
</head>

    const startBtn    = document.getElementById("start-btn");
    const startBtn2      = document.getElementById("start-btn-2");
    const startBtnText   = document.getElementById("start-btn-text");
    const startBtnCursor = document.getElementById("start-btn-cursor");
    const overlay     = document.getElementById("overlay");
    const textArea    = document.getElementById("text-area");
    const textContent = document.getElementById("text-content");
    const textCursor  = document.getElementById("text-cursor");

    let currentSceneId     = "intro";
    let videoEnded         = false;
    let alreadyVisitedMenu = false;
    let jumpPending        = false;
    let typewriterTimeout  = null;
    let startBtnTyping     = false;

    // FORTSCHRITTS-BALKEN
    const SCENE_ORDER = [
      "intro", "szene_in", "szene_a", "szene_b", "szene_c",
      "szene_d", "szene_e", "szene_e2", "szene_ea", "szene_eb",
      "szene_eba", "szene_ebb", "szene_ec", "szene_f", "szene_g",
      "szene_h", "szene_i", "szene_j", "szene_k", "szene_k2",
      "szene_l", "szene_m", "szene_n"
    ];
    const visitedScenes = new Set();
    const progressBarContainer = document.getElementById("progress-bar-container");
    const progressBar = document.getElementById("progress-bar");

    function updateProgressBar(sceneId) {
      visitedScenes.add(sceneId);
      const maxIndex = Math.max(...[...visitedScenes].map(id => SCENE_ORDER.indexOf(id)).filter(i => i >= 0));
      const progress = (maxIndex + 1) / SCENE_ORDER.length * 100;
      progressBar.style.width = progress + "%";
    }

    // =============================================
    // INAKTIVITÄTS-RESET (5 Minuten)
    // =============================================

    const IDLE_MS = 5 * 60 * 1000; // 5 Minuten
    let idleTimer = null;

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      // Nur resetten wenn wir NICHT schon auf dem Startscreen sind
      if (currentSceneId === "intro" && !startScreen.classList.contains("hidden")) return;
      idleTimer = setTimeout(() => {
        resetToStart();
      }, IDLE_MS);
    }

    function resetToStart() {
      clearTypewriter();
      clearVideoLabels();
      document.getElementById("hotspot-layer").innerHTML = "";
      document.getElementById("video-container").classList.remove("bordered");
      textArea.classList.remove("bordered");
      // Quellen-Spot zurücksetzen — erst nach erneutem Start sichtbar
      appStarted = false;
      sourceShown = false;
      sourceSpot.classList.remove("visible");
      sourceTooltip.classList.remove("visible");
      sourceSpot.style.left = "-9999px";
      sourceSpot.style.top  = "-9999px";
      progressBarContainer.classList.remove("visible");
      progressBar.style.width = "0%";
      visitedScenes.clear();
      currentSceneId     = "intro";
      videoEnded         = false;
      alreadyVisitedMenu = false;
      video.src = scenes["intro"].file;
      video.load();
      startScreen.classList.remove("hidden");
      buildHotspots(scenes["intro"].hotspots || []);
      // Intro-Button zurücksetzen
      startBtnText.textContent = "";
      startBtnCursor.style.display = "";
      startBtn2.classList.remove("visible");
      startBtnTyping = false;
    }

    // Jede Nutzerinteraktion setzt den Timer zurück
    ["click","keydown","mousemove","touchstart","scroll"].forEach(evt => {
      document.addEventListener(evt, resetIdleTimer, { passive: true });
    });

    // Erstes Frame laden
    video.addEventListener("loadedmetadata", () => {
      if (jumpPending) {
        jumpPending = false;
        jumpToEnd();
      } else {
        video.currentTime = 0.01;
      }
    });

    // =============================================
    // INTRO-SEQUENZ: Startbutton 1 → Text tippen → Startbutton 2 → Video
    // =============================================

    // Der Text, der in den Start-Button getippt wird
    const START_BTN_TYPE_TEXT = "Wie viel kostet ein Prompt in der Größe eines Posts?";
    const START_BTN_TYPE_SPEED = 55; // ms pro Zeichen

    // Phase 1: Klick auf Startbutton → Text tippen + Button 2 einblenden
    startBtn.addEventListener("click", () => {
      if (startBtnTyping) return; // nur einmal
      startBtnTyping = true;

      let i = 0;
      function typeNextChar() {
        if (i < START_BTN_TYPE_TEXT.length) {
          startBtnText.textContent += START_BTN_TYPE_TEXT[i];
          i++;
          setTimeout(typeNextChar, START_BTN_TYPE_SPEED);
        } else {
          // Tipp fertig: Cursor ausblenden, Button 2 einblenden
          startBtnCursor.style.display = "none";
          startBtn2.classList.add("visible");
        }
      }

      // Cursor im Button ausblenden während des Tippens — nein, soll weiter blinken
      // Button 2 schon beim ersten Zeichen einblenden (zeitgleich)
      setTimeout(() => {
        startBtn2.classList.add("visible");
      }, 0);

      typeNextChar();
    });

    // Phase 2: Klick auf Startbutton 2 → Video starten, wie bisher
    startBtn2.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      video.play();
      videoEnded = false;
      alreadyVisitedMenu = true;
      resetIdleTimer();
      progressBarContainer.classList.add("visible");
      updateProgressBar("intro");

      const scene = scenes[currentSceneId];
      if (scene.text) {
        startTypewriter(
          scene.text,
          scene.textAreaDelay !== undefined ? scene.textAreaDelay : 0,
          scene.textDelay     !== undefined ? scene.textDelay     : 0.5,
          scene.textSpeed     !== undefined ? scene.textSpeed     : 40
        );
      }
      if (scene.footnote) {
        document.getElementById("footnote-content").innerHTML =
          scene.footnote.replace(/\n/g, "<br>");
      }
      if (scene.labels) buildVideoLabels(scene.labels);

      // Rahmen, Textfeld und src-Spot erscheinen gleichzeitig
      setTimeout(() => {
        document.getElementById("video-container").classList.add("bordered");
        textArea.classList.add("bordered");
        appStarted = true;
        updateSourceSpot(scene);
      }, 2000);
    });

    // Hotspots ein/ausblenden
    video.addEventListener("timeupdate", () => {
      if (videoEnded) return;
      const t = video.currentTime;
      const scene = scenes[currentSceneId];
      if (!scene) return;

      document.querySelectorAll(".hotspot").forEach((div, i) => {
        const hs = scene.hotspots[i];
        if (!hs) return;
        const afterShow  = (hs.showAt === undefined || t >= hs.showAt);
        const beforeHide = (hs.hideAt === undefined || t < hs.hideAt);
        if (afterShow && beforeHide) {
          div.classList.add("visible");
        } else if (hs.hideAt !== undefined && t >= hs.hideAt) {
          div.classList.remove("visible");
        }
      });
    });

      video.addEventListener("ended", () => {
        videoEnded = true;

        // nochmal alle Hotspots prüfen — falls timeupdate sie verpasst hat
        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;

          const afterShow  = (hs.showAt === undefined || video.duration >= hs.showAt);
          const beforeHide = (hs.hideAt === undefined);

          if (afterShow && beforeHide) {
            div.classList.add("visible");
          }
        });

        if (scene.resetToStart) {
          setTimeout(() => {
            clearTypewriter();
            clearVideoLabels();
            document.getElementById("hotspot-layer").innerHTML = "";
            document.getElementById("video-container").classList.remove("bordered");
            textArea.classList.remove("bordered");
            currentSceneId     = "intro";
            videoEnded         = false;
            alreadyVisitedMenu = false;
            video.src = scenes["intro"].file;
            video.load();
            startScreen.classList.remove("hidden");
            buildHotspots(scenes["intro"].hotspots);
          }, 180000);
        }
      });

      function jumpToEnd() {
        video.currentTime = video.duration - 0.01;
        videoEnded = true;

        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;
          // hideAt respektieren, sonst immer einblenden
          if (hs.hideAt === undefined) {
            div.classList.add("visible");
          }
        });
      }

    // --- Typewriter ---

    // Text-Syntax für Farben: <c:green>Wort</c> oder <c:#ff0000>Wort</c>
    // Vordefinierte Farbnamen: green, red, yellow, orange, cyan, white
    const COLOR_ALIASES = {
      green:  "rgba(3, 252, 92, 0.95)",
      red:    "rgba(255, 80, 80, 0.95)",
      yellow: "rgba(255, 220, 60, 0.95)",
      orange: "rgba(255, 150, 50, 0.95)",
      cyan:   "rgba(80, 220, 255, 0.95)",
      white:  "rgba(255, 255, 255, 1)"
    };

    // Parst Text mit <c:farbe>...</c> in Segmente: [{text, color}]
    function parseColoredText(raw) {
      const segments = [];
      const regex = /<c:([^>]+)>([\s\S]*?)<\/c>/g;
      let last = 0, m;
      while ((m = regex.exec(raw)) !== null) {
        if (m.index > last) segments.push({ text: raw.slice(last, m.index), color: null });
        const col = COLOR_ALIASES[m[1]] || m[1];
        segments.push({ text: m[2], color: col });
        last = m.index + m[0].length;
      }
      if (last < raw.length) segments.push({ text: raw.slice(last), color: null });
      return segments;
    }

    function clearTypewriter() {
      if (typewriterTimeout) {
        clearTimeout(typewriterTimeout);
        typewriterTimeout = null;
      }
      textContent.innerHTML = "";
      textContent.appendChild(textCursor);
      textCursor.classList.remove("hidden");
      textArea.classList.remove("visible");
      document.getElementById("footnote-content").innerHTML = "";
    }

    function startTypewriter(text, areaDelay, delay, speed) {
      clearTypewriter();
      const segments = parseColoredText(text);

      // Alle Zeichen als flache Liste: {char, color}
      const chars = [];
      for (const seg of segments) {
        for (const ch of seg.text) {
          chars.push({ ch, color: seg.color });
        }
      }

      setTimeout(() => {
        textArea.classList.add("visible");
      }, areaDelay * 1000);

      setTimeout(() => {
        let i = 0;
        function typeNext() {
          if (i < chars.length) {
            const { ch, color } = chars[i];
            if (color) {
              const span = document.createElement("span");
              span.style.color = color;
              span.textContent = ch;
              textContent.insertBefore(span, textCursor);
            } else {
              const node = document.createTextNode(ch);
              textContent.insertBefore(node, textCursor);
            }
            i++;
            typewriterTimeout = setTimeout(typeNext, speed);
          } else {
            typewriterTimeout = null;
          }
        }
        typeNext();
      }, delay * 1000);
    }

    // --- Video-Labels ---
    // labels: [ { text, x, y, showAt, hideAt, size, color, speed } ]

    let labelTypewriterTimeouts = [];

    function clearVideoLabels() {
      labelTypewriterTimeouts.forEach(t => clearTimeout(t));
      labelTypewriterTimeouts = [];
      const layer = document.getElementById("video-label-layer");
      if (layer) layer.innerHTML = "";
    }

    function buildVideoLabels(labels) {
      clearVideoLabels();
      if (!labels || !labels.length) return;

      const layer = document.getElementById("video-label-layer");
      layer.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;";

      for (const lb of labels) {
        const div = document.createElement("div");
        div.className = "video-label";
        div.style.left = lb.x || "50%";
        div.style.top  = lb.y || "50%";
        if (lb.size)  div.style.fontSize = lb.size;
        if (lb.color) div.style.color    = lb.color;

        // Cursor-Span
        const cursor = document.createElement("span");
        cursor.className = "video-label-cursor";
        div.appendChild(cursor);
        layer.appendChild(div);

        // showAt / hideAt via timeupdate
        div._labelCfg = lb;
        div._labelTyped = false;
      }
    }

    // timeupdate für Labels
    video.addEventListener("timeupdate", () => {
      const t = video.currentTime;
      document.querySelectorAll(".video-label").forEach(div => {
        const lb = div._labelCfg;
        if (!lb) return;
        const show = lb.showAt !== undefined ? t >= lb.showAt : true;
        const hide = lb.hideAt !== undefined ? t >= lb.hideAt : false;

        if (hide) {
          div.classList.remove("visible");
          return;
        }
        if (show && !div._labelTyped) {
          div._labelTyped = true;
          div.classList.add("visible");
          const speed = lb.speed !== undefined ? lb.speed : 50;
          const text  = lb.text || "";
          const cursor = div.querySelector(".video-label-cursor");
          let i = 0;
          function typeNext() {
            if (i < text.length) {
              const node = document.createTextNode(text[i]);
              div.insertBefore(node, cursor);
              i++;
              const tid = setTimeout(typeNext, speed);
              labelTypewriterTimeouts.push(tid);
            } else {
              setTimeout(() => { cursor.style.display = "none"; }, 800);
            }
          }
          typeNext();
        }
      });
    });

    function loadScene(id) {
      if (!id) return;
      currentSceneId = id;
      videoEnded = false;
      const scene = scenes[id];
      resetIdleTimer();
      updateProgressBar(id);

      // Umrandung ab dem ersten Klick (zweites Video)
      document.getElementById("video-container").classList.add("bordered");
      textArea.classList.add("bordered");

      overlay.classList.add("fade");

      setTimeout(() => {
        buildHotspots(scene.hotspots);
        clearVideoLabels();
        if (scene.labels) buildVideoLabels(scene.labels);
        updateSourceSpot(scene);

        if (scene.text) {
          startTypewriter(
            scene.text,
            scene.textAreaDelay !== undefined ? scene.textAreaDelay : 0,
            scene.textDelay     !== undefined ? scene.textDelay     : 0.5,
            scene.textSpeed     !== undefined ? scene.textSpeed     : 40
          );
        } else {
          clearTypewriter();
        }
        if (scene.footnote) {
          document.getElementById("footnote-content").innerHTML =
            scene.footnote.replace(/\n/g, "<br>");
        } else {
          document.getElementById("footnote-content").innerHTML = "";
        }

        if (scene.isMenu && alreadyVisitedMenu) {
          jumpPending = true;
          video.src = scene.file;
          video.load();
        } else {
          video.src = scene.file;
          video.play();
        }

        overlay.classList.remove("fade");
      }, 400);
    }

    function buildHotspots(hotspots) {
      const layer = document.getElementById("hotspot-layer");
      layer.innerHTML = "";

      for (const hs of hotspots) {
        const div = document.createElement("div");
        div.className = "hotspot";
        div.style.left      = hs.x;
        div.style.top       = hs.y;
        div.style.width     = hs.w;
        div.style.height    = hs.h;
        div.style.transform = "translate(-50%, -50%)";

        if (hs.label === "weiter") {
          div.innerHTML = "&#x2192;";   // →
        } else if (hs.label === "X") {
          div.innerHTML = "&#x2715;";   // ✕
        } else {
          div.textContent = hs.label || "";
        }
        
        if (hs.color)        div.style.background   = hs.color;
        if (hs.borderColor)  div.style.borderColor  = hs.borderColor;
        if (hs.borderRadius) div.style.borderRadius = hs.borderRadius;
        if (hs.pulseColor)   div.style.setProperty("--pulse-color", hs.pulseColor);
        if (hs.pulseSize)    div.style.setProperty("--pulse-size",  hs.pulseSize);
        if (hs.pulse)        div.classList.add("pulse");

        div.onclick = () => {
          if (hs.target === "__reset__") { resetToStart(); } else { loadScene(hs.target); }
        };
        layer.appendChild(div);
      }
    }


    // =============================================
    // QUELLEN-SPOT
    // =============================================

    const sourceSpot    = document.getElementById("source-spot");
    const sourceTooltip = document.getElementById("source-tooltip");
    let sourceShown = false;
    let appStarted  = false;  // Spot erst nach Startbutton-Klick aktiv

    function updateSourceSpot(scene) {
      if (!appStarted) return;  // vor Startbutton-Klick nichts tun
      sourceShown = false;
      sourceSpot.classList.remove("visible");
      sourceTooltip.classList.remove("visible");

      if (!scene || !scene.sources) return;

      const cfg = scene.sources;
      // % relativ zum video-container, genau wie Hotspots
      sourceSpot.style.left = cfg.x || "50%";
      sourceSpot.style.top  = cfg.y || "50%";
      sourceTooltip.innerHTML = "<strong>Quellen</strong>" +
        (cfg.text || "").replace(/\n/g, "<br>");

      if (!cfg.showAt || cfg.showAt <= 0) {
        sourceSpot.classList.add("visible");
        sourceShown = true;
      }
    }

    // timeupdate für showAt des Quellen-Spots
    video.addEventListener("timeupdate", () => {
      if (!appStarted || sourceShown) return;
      const scene = scenes[currentSceneId];
      if (!scene || !scene.sources) return;
      const cfg = scene.sources;
      if (cfg.showAt !== undefined && video.currentTime >= cfg.showAt) {
        sourceSpot.classList.add("visible");
        sourceShown = true;
      }
    });

    // Hover: Tooltip ein-/ausblenden
    sourceSpot.addEventListener("mouseenter", () => {
      const scene = scenes[currentSceneId];
      if (!scene || !scene.sources) return;

      // Spot-Position auslesen (offsetLeft/Top = px relativ zum Container)
      const sl = sourceSpot.offsetLeft;  // Mitte dank transform: translate(-50%,-50%)
      const st = sourceSpot.offsetTop;
      // Tooltip zentriert über dem Spot — Breite messen
      sourceTooltip.style.visibility = "hidden";
      sourceTooltip.style.left = "0px";
      sourceTooltip.style.top  = "0px";
      sourceTooltip.classList.add("visible");
      const ttW = sourceTooltip.offsetWidth;
      const ttH = sourceTooltip.offsetHeight;
      sourceTooltip.classList.remove("visible");
      sourceTooltip.style.visibility = "";
      sourceTooltip.style.left = (sl - ttW / 2 + 160) + "px";
      sourceTooltip.style.top  = (st - ttH - 30) + "px";
      sourceTooltip.classList.add("visible");
    });

    sourceSpot.addEventListener("mouseleave", () => {
      sourceTooltip.classList.remove("visible");
    });

    buildHotspots(scenes[currentSceneId].hotspots);

  </script>
</body>
