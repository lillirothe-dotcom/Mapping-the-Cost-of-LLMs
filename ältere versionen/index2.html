<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>interaktives video</title>
  
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* =============================================
       START-SCREEN
       ============================================= */

    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === START-BUTTON — hier anpassen === */
    #start-btn {
      cursor: pointer;

      /* Form */
      padding: 16px 40px;
      border-radius: 4px;

      /* Farben */
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: rgba(255, 255, 255, 0.9);

      /* Schrift */
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;

      /* Hover-Übergang */
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    #start-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 1);
    }

    #start-screen.hidden {
      display: none;
    }


    /* =============================================
       HOTSPOT-LAYER
       ============================================= */

    #hotspot-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      pointer-events: none;

      /* === HOTSPOT-STYLING — hier anpassen === */
      border: 2.5px solid rgba(255,0,112, 0.5);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);

      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;

      opacity: 0;
      transition: opacity 0.6s, background 0.2s;
    }

    .hotspot.visible {
      opacity: 1;
      pointer-events: all;
    }

    .hotspot:hover {
      background: rgba(255,0,112, 0.2);
    }


    /* =============================================
       ÜBERGANGS-OVERLAY
       ============================================= */

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #overlay.fade {
      opacity: 1;
    }
      
      
    /* =============================================
       PULSE-ANIMATION
       ============================================= */

    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0px var(--pulse-color); }
        50%       { box-shadow: 0 0 0 10px transparent; }
    }

    .hotspot.pulse {
        animation: pulse 2s ease-in-out infinite;
    }

  </style>
</head>
<body>

  <div id="wrapper">

    <!-- Video — lädt das erste Frame als Standbild -->
    <video id="video" src="videos/1.0.mp4" muted preload="metadata"></video>

    <!-- Start-Screen liegt über dem Video -->
    <div id="start-screen">
      <button id="start-btn">Start</button>
    </div>

    <div id="hotspot-layer"></div>
    <div id="overlay"></div>

  </div>

  <script>

    // =============================================
    // SZENEN — hier alles einstellen
    // =============================================
    //
    // Felder pro Hotspot:
    //
    //   x, y       — Position (in %, von oben links)
    //   w, h       — Größe (in %)
    //   target     — Szene die beim Klick geladen wird
    //   label      — Text im Hotspot (optional)
    //   showAt     — ab welcher Sekunde einblenden (optional)
    //   hideAt     — bis zu welcher Sekunde sichtbar (optional)
    //
    // Wenn kein hideAt gesetzt ist, bleibt der Hotspot
    // nach dem showAt dauerhaft sichtbar — auch wenn das
    // Video zu Ende ist.

    const scenes = {
      intro: {
        file: "videos/1.0.mp4",
        isMenu: true,
        hotspots: [
          {
            x: "42%", y: "40%", w: "9%", h: "5%",
            target: "szene_a",
            showAt: 14
            
          },
                   
          {
            x: "53.5%", y: "36%", w: "2%", h: "33%",
            target: "szene_b",
            showAt: 14
          }
                   
        ]
      },
      
      szene_a: {
        file: "videos/1.1.mp4",
        hotspots: [
          {
            x: "5%", y: "75%", w: "18%", h: "16%",
            target: "intro",
            label: "← zurück",
            showAt: 3,
            color: "rgba(255, 80, 80, 0.15)",
            borderColor: "rgba(255, 80, 80, 0.7)",
            pulseColor: "rgba(255, 80, 80, 0.5)",
            pulse: true
          }
        ]
      },
      
      szene_b: {
        file: "videos/1.2.mp4",
        hotspots: [
          {
            x: "5%", y: "75%", w: "18%", h: "16%",
            target: "intro",
            label: "← zurück",
            showAt: 3
          }
        ]
      }
      
    };


    // =============================================
    // AB HIER NICHTS MEHR ANFASSEN
    // =============================================

    const video       = document.getElementById("video");
    const startScreen = document.getElementById("start-screen");
    const startBtn    = document.getElementById("start-btn");
    const overlay     = document.getElementById("overlay");

    let currentSceneId = "intro";
    let videoEnded     = false;
    let alreadyVisitedMenu = false;

    // Erstes Frame laden damit der Startbildschirm
    // das Video im Hintergrund zeigt
    video.addEventListener("loadedmetadata", () => {
      video.currentTime = 0.01;
    });

    // Start-Button startet das erste Video
    startBtn.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      video.play();
      videoEnded = false;
    });

    // Video läuft — Hotspots ein/ausblenden
    video.addEventListener("timeupdate", () => {
      if (videoEnded) return;
      const t = video.currentTime;
      const scene = scenes[currentSceneId];
      if (!scene) return;

      document.querySelectorAll(".hotspot").forEach((div, i) => {
        const hs = scene.hotspots[i];
        if (!hs) return;

        const afterShow  = (hs.showAt === undefined || t >= hs.showAt);
        const beforeHide = (hs.hideAt === undefined || t < hs.hideAt);

        if (afterShow && beforeHide) {
          div.classList.add("visible");
        } else if (hs.hideAt !== undefined && t >= hs.hideAt) {
          div.classList.remove("visible");
        }
      });
    });

    // Video zu Ende — Hotspots bleiben stehen, kein Replay
    video.addEventListener("ended", () => {
      videoEnded = true;
      // Hotspots ohne hideAt bleiben einfach sichtbar stehen
    });

      function loadScene(id) {
        currentSceneId = id;
        videoEnded = false;
        const scene = scenes[id];

        overlay.classList.add("fade");

        setTimeout(() => {
          video.src = scene.file;

          if (scene.isMenu && alreadyVisitedMenu) {
            // direkt ans Ende springen, Video nicht abspielen
            video.addEventListener("loadedmetadata", jumpToEnd);
          } else {
            // normal abspielen
            video.play();
            if (scene.isMenu) alreadyVisitedMenu = true;
          }

          buildHotspots(scene.hotspots);
          overlay.classList.remove("fade");
        }, 400);
      }

      function jumpToEnd() {
        video.currentTime = video.duration - 0.01;
        videoEnded = true;
        // Hotspots sofort einblenden
        document.querySelectorAll(".hotspot").forEach(div => {
          div.classList.add("visible");
        });
        video.removeEventListener("loadedmetadata", jumpToEnd);
      }
      
      function buildHotspots(hotspots) {
        const layer = document.getElementById("hotspot-layer");
        layer.innerHTML = "";

        for (const hs of hotspots) {
          const div = document.createElement("div");
          div.className = "hotspot";
          div.style.left   = hs.x;
          div.style.top    = hs.y;
          div.style.width  = hs.w;
          div.style.height = hs.h;
          div.textContent  = hs.label || "";

          // Farbe individuell setzen
          if (hs.color)       div.style.background   = hs.color;
          if (hs.borderColor) div.style.borderColor  = hs.borderColor;
          if (hs.pulseColor) div.style.setProperty("--pulse-color", hs.pulseColor);
          // Pulse als CSS-Klasse
          if (hs.pulse) div.classList.add("pulse");

          div.onclick = () => loadScene(hs.target);
          layer.appendChild(div);
        }
      }

    // Hotspots für die erste Szene vorbereiten (noch unsichtbar)
    buildHotspots(scenes[currentSceneId].hotspots);

  </script>
</body>
</html>
