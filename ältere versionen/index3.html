<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>interaktives video</title>
  
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* =============================================
       START-SCREEN
       ============================================= */

    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 60%;
      height: 10%;
      display: flex;
      /*  align-items: center;
      justify-content: center; */
    }

    /* === START-BUTTON — hier anpassen === */
    #start-btn {
      cursor: pointer;

      /* Form */
      padding: 16px 40px;
      border-radius: 4px;

      /* Farben */
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: rgba(255, 255, 255, 0.9);

      /* Schrift */
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;

      /* Hover-Übergang */
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    #start-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 1);
    }

    #start-screen.hidden {
      display: none;
    }


    /* =============================================
       HOTSPOT-LAYER
       ============================================= */

    #hotspot-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      pointer-events: none;

      /* === HOTSPOT-STYLING — hier anpassen === */
      border: 2.5px solid rgba(255,0,112, 0.5);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);

      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;

      opacity: 0;
      transition: opacity 0.6s, background 0.2s;
    }

    .hotspot.visible {
      opacity: 1;
      pointer-events: all;
    }

    .hotspot:hover {
      background: rgba(255,0,112, 0.2);
    }


    /* =============================================
       ÜBERGANGS-OVERLAY
       ============================================= */

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #overlay.fade {
      opacity: 1;
    }
      
      
    /* =============================================
       PULSE-ANIMATION
       ============================================= */

    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0px var(--pulse-color); }
        50%       { box-shadow: 0 0 0 10px transparent; }
    }

    .hotspot.pulse {
        animation: pulse 2s ease-in-out infinite;
    }

  </style>
</head>
<body>

  <div id="wrapper">

    <!-- Video — lädt das erste Frame als Standbild -->
    <video id="video" src="videos/start.mp4" muted preload="metadata"></video>

    <!-- Start-Screen liegt über dem Video -->
    <div id="start-screen">
      <button id="start-btn">Start</button>
    </div>

    <div id="hotspot-layer"></div>
    <div id="overlay"></div>

  </div>

  <script>

    // =============================================
    // SZENEN — hier alles einstellen
    // =============================================
    //
    // Felder pro Hotspot:
    //
    //   x, y        — Position (in %, von oben links)
    //   w, h        — Größe (in %)
    //   target      — Szene die beim Klick geladen wird
    //   label       — Text im Hotspot (optional)
    //   showAt      — ab welcher Sekunde einblenden (optional)
    //   hideAt      — bis zu welcher Sekunde sichtbar (optional)
    //   color       — Hintergrundfarbe des Hotspots (optional)
    //   borderColor — Rahmenfarbe (optional)
    //   pulseColor  — Farbe des Pulses (optional)
    //   pulse       — true/false, ob er pulsiert (optional)
    //
    // isMenu: true  — diese Szene wird beim zweiten Besuch
    //                 direkt als Standbild gezeigt (kein Video)

    const scenes = {
      intro: {
        file: "videos/start.mp4",
        isMenu: true,
        hotspots: [
          {
            x: "52%", y: "48%", w: "6%", h: "10%",
            target: "szene_a",
            showAt: 4
          }
        ]
      },
      
      szene_a: {
        file: "videos/1.1.mp4",
        hotspots: [
          {
            x: "5%", y: "75%", w: "18%", h: "16%",
            target: "intro",
            label: "← zurück",
            showAt: 3,
            color: "rgba(255, 80, 80, 0.15)",
            borderColor: "rgba(255, 80, 80, 0.7)",
            pulseColor: "rgba(255, 80, 80, 0.5)",
            pulse: true
          }
        ]
      },
      
      szene_b: {
        file: "videos/1.2.mp4",
        hotspots: [
          {
            x: "5%", y: "75%", w: "18%", h: "16%",
            target: "intro",
            label: "← zurück",
            showAt: 3
          }
        ]
      }
      
    };


    // =============================================
    // AB HIER NICHTS MEHR ANFASSEN
    // =============================================

    const video       = document.getElementById("video");
    const startScreen = document.getElementById("start-screen");
    const startBtn    = document.getElementById("start-btn");
    const overlay     = document.getElementById("overlay");

    let currentSceneId     = "intro";
    let videoEnded         = false;
    let alreadyVisitedMenu = false;
    let jumpPending        = false;   // merkt sich ob wir ans Ende springen wollen

    // Erstes Frame laden damit der Startbildschirm
    // das Video im Hintergrund zeigt
    video.addEventListener("loadedmetadata", () => {
      if (jumpPending) {
        jumpPending = false;
        jumpToEnd();
      } else {
        video.currentTime = 0.01;
      }
    });

    // Start-Button startet das erste Video
    startBtn.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      video.play();
      videoEnded = false;
      alreadyVisitedMenu = true;   // erster Besuch zählt jetzt
    });

    // Video läuft — Hotspots ein/ausblenden
    video.addEventListener("timeupdate", () => {
      if (videoEnded) return;
      const t = video.currentTime;
      const scene = scenes[currentSceneId];
      if (!scene) return;

      document.querySelectorAll(".hotspot").forEach((div, i) => {
        const hs = scene.hotspots[i];
        if (!hs) return;

        const afterShow  = (hs.showAt === undefined || t >= hs.showAt);
        const beforeHide = (hs.hideAt === undefined || t < hs.hideAt);

        if (afterShow && beforeHide) {
          div.classList.add("visible");
        } else if (hs.hideAt !== undefined && t >= hs.hideAt) {
          div.classList.remove("visible");
        }
      });
    });

    // Video zu Ende — Hotspots bleiben stehen, kein Replay
    video.addEventListener("ended", () => {
      videoEnded = true;
    });

    function jumpToEnd() {
      // ans letzte Frame springen ohne abzuspielen
      video.currentTime = video.duration - 0.01;
      videoEnded = true;
      // alle Hotspots sofort einblenden
      document.querySelectorAll(".hotspot").forEach(div => {
        div.classList.add("visible");
      });
    }

    function loadScene(id) {
      currentSceneId = id;
      videoEnded = false;
      const scene = scenes[id];

      overlay.classList.add("fade");

      setTimeout(() => {
        buildHotspots(scene.hotspots);

        if (scene.isMenu && alreadyVisitedMenu) {
          // Flag setzen — loadedmetadata-Handler springt dann ans Ende
          jumpPending = true;
          video.src = scene.file;
          video.load();
        } else {
          video.src = scene.file;
          video.play();
        }

        overlay.classList.remove("fade");
      }, 400);
    }

    function buildHotspots(hotspots) {
      const layer = document.getElementById("hotspot-layer");
      layer.innerHTML = "";

      for (const hs of hotspots) {
        const div = document.createElement("div");
        div.className = "hotspot";
        div.style.left   = hs.x;
        div.style.top    = hs.y;
        div.style.width  = hs.w;
        div.style.height = hs.h;
        div.textContent  = hs.label || "";

        if (hs.color)       div.style.background  = hs.color;
        if (hs.borderColor) div.style.borderColor = hs.borderColor;
        if (hs.pulseColor)  div.style.setProperty("--pulse-color", hs.pulseColor);
        if (hs.pulse)       div.classList.add("pulse");

        div.onclick = () => loadScene(hs.target);
        layer.appendChild(div);
      }
    }

    // Hotspots für die erste Szene vorbereiten (noch unsichtbar)
    buildHotspots(scenes[currentSceneId].hotspots);

  </script>
</body>
</html>
