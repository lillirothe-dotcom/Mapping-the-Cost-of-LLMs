  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* =============================================
       START-SCREEN
       ============================================= */

    #start-screen {
      position: absolute;
      top: 55%;
      left: 17.5%;
      width: auto;
      height: auto;
      display: flex;
    }

    /* === START-BUTTON — hier anpassen === */
    #start-btn {
      cursor: pointer;
      width: 1372px;
      height: 200px;
      padding: 16px 40px;
      border-radius: 100px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      --pulse-color: rgba(3, 252, 92, 0.5);
      --pulse-size: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    #start-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 1);
    }

    #start-screen.hidden {
      display: none;
    }


    /* =============================================
       HOTSPOT-LAYER
       ============================================= */

    #hotspot-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.04);
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.7);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      opacity: 0;
      transition: opacity 0.6s, background 0.2s;
      --pulse-size: 10px;
    }

    .hotspot.visible {
      opacity: 1;
      pointer-events: all;
    }

    .hotspot:hover {
      background: rgba(3, 252, 92, 0.2);
    }


    /* =============================================
       ÜBERGANGS-OVERLAY
       ============================================= */

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #overlay.fade {
      opacity: 1;
    }


    /* =============================================
       PULSE-ANIMATION
       ============================================= */

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0px var(--pulse-color); }
      50%       { box-shadow: 0 0 0 var(--pulse-size) transparent; }
    }

    .hotspot.pulse {
      animation: pulse 2s ease-in-out infinite;
    }


    /* =============================================
       TEXT-BEREICH
       ============================================= */

    #text-area {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;

      /* === GRÖSSE — hier anpassen === */
      height: 20%;

      /* === AUSSEHEN — hier anpassen === */
      background: #000;
      padding: 24px 40px;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    #text-area.visible {
      opacity: 1;
    }

    #text-content {
      /* === SCHRIFT — hier anpassen === */
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      line-height: 1.7;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.85);
    }

    #text-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: rgba(255, 255, 255, 0.7);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    #text-cursor.hidden {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

  </style>
</head>

            color: "rgba(3, 252, 92, 0.80)",
            borderRadius: "8px",
            pulse: true,
            pulseColor: "rgba(3, 252, 92, 0.5)",
            pulseSize: "30px"
          }
        ]
      }


    };


    // =============================================
    // AB HIER NICHTS MEHR ANFASSEN
    // =============================================

    const video       = document.getElementById("video");
    const startScreen = document.getElementById("start-screen");
    const startBtn    = document.getElementById("start-btn");
    const overlay     = document.getElementById("overlay");
    const textArea    = document.getElementById("text-area");
    const textContent = document.getElementById("text-content");
    const textCursor  = document.getElementById("text-cursor");

    let currentSceneId     = "intro";
    let videoEnded         = false;
    let alreadyVisitedMenu = false;
    let jumpPending        = false;
    let typewriterTimeout  = null;

    // Erstes Frame laden
    video.addEventListener("loadedmetadata", () => {
      if (jumpPending) {
        jumpPending = false;
        jumpToEnd();
      } else {
        video.currentTime = 0.01;
      }
    });

    // Start-Button — alle 4 Parameter korrekt übergeben
    startBtn.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      video.play();
      videoEnded = false;
      alreadyVisitedMenu = true;

      const scene = scenes[currentSceneId];
      if (scene.text) {
        startTypewriter(
          scene.text,
          scene.textAreaDelay !== undefined ? scene.textAreaDelay : 0,
          scene.textDelay     !== undefined ? scene.textDelay     : 0.5,
          scene.textSpeed     !== undefined ? scene.textSpeed     : 40
        );
      }
    });

    // Hotspots ein/ausblenden
    video.addEventListener("timeupdate", () => {
      if (videoEnded) return;
      const t = video.currentTime;
      const scene = scenes[currentSceneId];
      if (!scene) return;

      document.querySelectorAll(".hotspot").forEach((div, i) => {
        const hs = scene.hotspots[i];
        if (!hs) return;
        const afterShow  = (hs.showAt === undefined || t >= hs.showAt);
        const beforeHide = (hs.hideAt === undefined || t < hs.hideAt);
        if (afterShow && beforeHide) {
          div.classList.add("visible");
        } else if (hs.hideAt !== undefined && t >= hs.hideAt) {
          div.classList.remove("visible");
        }
      });
    });

      video.addEventListener("ended", () => {
        videoEnded = true;

        // nochmal alle Hotspots prüfen — falls timeupdate sie verpasst hat
        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;

          const afterShow  = (hs.showAt === undefined || video.duration >= hs.showAt);
          const beforeHide = (hs.hideAt === undefined);

          if (afterShow && beforeHide) {
            div.classList.add("visible");
          }
        });
      });

      function jumpToEnd() {
        video.currentTime = video.duration - 0.01;
        videoEnded = true;

        const scene = scenes[currentSceneId];
        if (!scene) return;

        document.querySelectorAll(".hotspot").forEach((div, i) => {
          const hs = scene.hotspots[i];
          if (!hs) return;
          // hideAt respektieren, sonst immer einblenden
          if (hs.hideAt === undefined) {
            div.classList.add("visible");
          }
        });
      }

    // --- Typewriter ---

    function clearTypewriter() {
      if (typewriterTimeout) {
        clearTimeout(typewriterTimeout);
        typewriterTimeout = null;
      }
      textContent.innerHTML = "";
      textContent.appendChild(textCursor);
      textCursor.classList.remove("hidden");
      textArea.classList.remove("visible");
    }

    function startTypewriter(text, areaDelay, delay, speed) {
      clearTypewriter();

      setTimeout(() => {
        textArea.classList.add("visible");
      }, areaDelay * 1000);

      setTimeout(() => {
        let i = 0;
        function typeNext() {
          if (i < text.length) {
            const node = document.createTextNode(text[i]);
            textContent.insertBefore(node, textCursor);
            i++;
            typewriterTimeout = setTimeout(typeNext, speed);
          } else {
            typewriterTimeout = null;
          }
        }
        typeNext();
      }, delay * 1000);
    }

    // --- Szene laden ---

    function loadScene(id) {
      currentSceneId = id;
      videoEnded = false;
      const scene = scenes[id];

      overlay.classList.add("fade");

      setTimeout(() => {
        buildHotspots(scene.hotspots);

        if (scene.text) {
          startTypewriter(
            scene.text,
            scene.textAreaDelay !== undefined ? scene.textAreaDelay : 0,
            scene.textDelay     !== undefined ? scene.textDelay     : 0.5,
            scene.textSpeed     !== undefined ? scene.textSpeed     : 40
          );
        } else {
          clearTypewriter();
        }

        if (scene.isMenu && alreadyVisitedMenu) {
          jumpPending = true;
          video.src = scene.file;
          video.load();
        } else {
          video.src = scene.file;
          video.play();
        }

        overlay.classList.remove("fade");
      }, 400);
    }

    function buildHotspots(hotspots) {
      const layer = document.getElementById("hotspot-layer");
      layer.innerHTML = "";

      for (const hs of hotspots) {
        const div = document.createElement("div");
        div.className = "hotspot";
        div.style.left   = hs.x;
        div.style.top    = hs.y;
        div.style.width  = hs.w;
        div.style.height = hs.h;
        div.textContent  = hs.label || "";

        if (hs.color)        div.style.background   = hs.color;
        if (hs.borderColor)  div.style.borderColor  = hs.borderColor;
        if (hs.borderRadius) div.style.borderRadius = hs.borderRadius;
        if (hs.pulseColor)   div.style.setProperty("--pulse-color", hs.pulseColor);
        if (hs.pulseSize)    div.style.setProperty("--pulse-size",  hs.pulseSize);
        if (hs.pulse)        div.classList.add("pulse");

        div.onclick = () => loadScene(hs.target);
        layer.appendChild(div);
      }
    }

    buildHotspots(scenes[currentSceneId].hotspots);

  </script>
</body>
</html>
